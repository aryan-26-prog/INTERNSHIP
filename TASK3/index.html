<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Counter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="counter-container">
        <div class="counter-header">
            <h1>Professional Counter</h1>
            <button class="action-btn" id="settings-btn" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
        
        <div class="counter-display-container">
            <div class="counter-display" id="counter">0</div>
            <div class="counter-change-indicator" id="change-indicator"></div>
        </div>
        
        <div class="counter-controls">
            <button class="control-btn decrement-btn" id="decrement">
                <i class="fas fa-minus"></i>
            </button>
            <button class="control-btn reset-btn" id="reset">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="control-btn increment-btn" id="increment">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        
        <div class="counter-settings" id="settings-panel">
            <h3><i class="fas fa-cog"></i> Settings</h3>
            <div class="setting-option">
                <label for="step-size">Step Size:</label>
                <input type="number" id="step-size" min="1" value="1">
            </div>
            <div class="setting-option">
                <label for="dark-mode">Dark Mode:</label>
                <label class="switch">
                    <input type="checkbox" id="dark-mode">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="setting-option">
                <label for="max-value">Maximum Value:</label>
                <input type="number" id="max-value" min="1" value="1000">
            </div>
        </div>
        
        <div class="counter-history">
            <h3><i class="fas fa-history"></i> History</h3>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
